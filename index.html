<!DOCTYPE html>
<html>
<head>
    <title>BB Furniture</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f2f2f2;
            color: #333;
        }
        header {
            background: black;
            color: white;
            padding: 30px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
        }
        .hero {
            text-align: center;
            padding: 40px 20px;
            background: white;
        }
        .hero img {
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .button {
            display: inline-block;
            background: #008000;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
        .gallery {
            padding: 40px 20px;
            text-align: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .gallery-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .instagram {
            text-align: center;
            padding: 40px;
            background: white;
        }
        .footer {
            background: black;
            color: white;
            text-align: center;
            padding: 30px 20px;
            line-height: 1.8;
        }
        h2 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        BB Furniture
    </header>

    <section class="hero">
        <h2>Premium Wooden Furniture</h2>
        <img src="https://images.unsplash.com/photo-1505693314120-0d443867891c?auto=format&fit=crop&w=800&q=80">
        <br>
        <a class="button" href="https://wa.me/918209142748?text=Hello%20BB%20Furniture,%20I%20am%20interested%20in%20your%20designs.">
           Order on WhatsApp
        </a>
    </section>

    <section class="gallery">
        <h2>Furniture Gallery</h2>
        <div class="gallery-grid">
            <img src="https://images.unsplash.com/photo-1538688525198-9b88f6f53126?auto=format&fit=crop&w=500&q=60">
            <img src="https://images.unsplash.com/photo-1540518614846-7eded433c457?auto=format&fit=crop&w=500&q=60">
            <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=500&q=60">

            <img src="https://images.unsplash.com/photo-1592078615290-033ee584e267?auto=format&fit=crop&w=500&q=60">
            <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=500&q=60">
        </div>
    </section>

    <section class="instagram">
        <h2>Follow Us on Instagram</h2>
        <a class="button" href="#" style="background: #E1306C;">Visit Instagram</a>

    <div class="footer">

</html>
